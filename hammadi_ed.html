<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:;">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>جدول الطوارئ — الحمادي</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --blue:#00539B;--dark:#002855;--teal:#3EC8D4;--light:#A3BBDB;
  --bg:#F4F6F9;--card:#fff;--border:#E2E8F0;
  --text:#1A2332;--sub:#64748B;--muted:#94A3B8;
  --s-bg:#E6F1FB;--s-cl:#0C447C;
  --m-bg:#FAEEDA;--m-cl:#633806;
  --sup-bg:#E1F5EE;--sup-cl:#085041;
  --rest-bg:#F1EFE8;--rest-cl:#444441;
  --vac-bg:#FBEAF0;--vac-cl:#72243E;
  --abs-bg:#FCEBEB;--abs-cl:#791F1F;
}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,'SF Arabic','Geeza Pro','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:15px;}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:none;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}

/* ══ LOGIN ══ */
#sLogin{background:var(--dark);align-items:center;justify-content:center;padding:1.5rem;}
.lcard{background:#fff;border-radius:20px;padding:2rem 1.5rem;width:100%;max-width:380px;}
.llogo{width:60px;height:60px;background:var(--blue);border-radius:16px;margin:0 auto 1.25rem;display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;font-weight:700;}
.ltitle{font-size:20px;font-weight:700;color:var(--dark);text-align:center;margin-bottom:3px;}
.lsub{font-size:13px;color:var(--sub);text-align:center;margin-bottom:1.75rem;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem;}
.rbtn{padding:18px 8px;border-radius:14px;border:2px solid var(--border);background:#fff;cursor:pointer;text-align:center;transition:all .2s;}
.rbtn.sel{border-color:var(--blue);background:var(--s-bg);}
.rbtn-icon{font-size:26px;margin-bottom:8px;display:block;}
.rbtn-label{font-size:14px;font-weight:700;color:var(--dark);display:block;}
.rbtn-sub{font-size:11px;color:var(--sub);display:block;margin-top:3px;}
.lfield{margin-bottom:1.25rem;}
.lfield label{font-size:13px;color:var(--sub);display:block;margin-bottom:6px;font-weight:500;}
.lfield select,.lfield input{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:15px;font-family:-apple-system,'SF Arabic','Geeza Pro','Helvetica Neue',Arial,sans-serif;outline:none;transition:border-color .15s;-webkit-appearance:none;}
.lfield select:focus,.lfield input:focus{border-color:var(--blue);}
.lfield input[type=password]{letter-spacing:8px;text-align:center;font-size:20px;}
.lerr{color:#A32D2D;font-size:13px;text-align:center;margin-bottom:.75rem;display:none;background:#FCEBEB;padding:8px;border-radius:8px;}
.lbtn{width:100%;padding:15px;border-radius:14px;background:var(--blue);color:#fff;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:-apple-system,'SF Arabic','Geeza Pro','Helvetica Neue',Arial,sans-serif;transition:background .15s;}
.lbtn:active{background:var(--dark);}

/* ══ APP ══ */
#sApp{background:var(--bg);}

/* topbar */
.topbar{background:var(--blue);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:10;box-shadow:0 2px 8px rgba(0,83,155,.3);}
.tb-info{display:flex;flex-direction:column;}
.tb-title{font-size:15px;font-weight:700;line-height:1.2;}
.tb-sub{font-size:12px;opacity:.8;margin-top:2px;}
.tb-actions{display:flex;align-items:center;gap:8px;}
.tb-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(255,255,255,.2);}
.tb-logout{padding:7px 13px;border-radius:10px;border:1.5px solid rgba(255,255,255,.4);background:transparent;color:#fff;font-size:12px;cursor:pointer;font-family:-apple-system,'SF Arabic','Geeza Pro','Helvetica Neue',Arial,sans-serif;}

/* content scroll */
.app-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 80px;}

/* bottom nav */
.bnav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:10;padding-bottom:env(safe-area-inset-bottom);}
.bnav-btn{flex:1;padding:10px 4px 8px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:11px;font-weight:500;font-family:-apple-system,'SF Arabic','Geeza Pro','Helvetica Neue',Arial,sans-serif;transition:color .15s;}
.bnav-btn.active{color:var(--blue);}
.bnav-icon{width:22px;height:22px;}

/* tabs */
.tab{display:none;}.tab.active{display:block;}

/* ── DATE STRIP ── */
.date-strip{background:#fff;border-radius:14px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.date-strip label{font-size:13px;color:var(--sub);font-weight:500;white-space:nowrap;}
.date-strip input{flex:1;border:none;background:transparent;color:var(--text);font-size:15px;font-family:-apple-system,'SF Arabic','Geeza Pro','Helvetica Neue',Arial,sans-serif;outline:none;}

/* ── MY SHIFT HERO ── */
.hero{background:linear-gradient(135deg,var(--blue),var(--dark));border-radius:18px;padding:1.25rem 1.5rem;color:#fff;margin-bottom:12px;}
.hero-date{font-size:12px;opacity:.7;margin-bottom:4px;}
.hero-name{font-size:18px;font-weight:700;margin-bottom:.75rem;}
.hero-box{background:rgba(255,255,255,.15);border-radius:12px;padding:13px 16px;backdrop-filter:blur(4px);}
.hero-sec{font-size:11px;opacity:.75;margin-bottom:4px;font-weight:500;}
.hero-shift{font-size:24px;font-weight:700;}
.hero-time{font-size:13px;opacity:.8;margin-top:4px;}
.hero-off{font-size:18px;font-weight:500;opacity:.7;}

/* ── SECTION CARDS ── */
.sec-card{background:#fff;border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.sec-hdr{padding:12px 16px;color:#fff;display:flex;justify-content:space-between;align-items:center;}
.sec-hdr-title{font-size:14px;font-weight:700;}
.sec-hdr-count{font-size:12px;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;}
.shift-row{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.shift-row:last-child{border-bottom:none;}
.shift-row-hdr{display:flex;align-items:center;gap:8px;}
.shift-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ds{background:#378ADD;}.dm{background:#BA7517;}.dsup{background:#1D9E75;}
.shift-label{font-size:13px;font-weight:700;color:var(--text);}
.shift-time{font-size:11px;color:var(--sub);margin-right:auto;background:var(--bg);padding:2px 8px;border-radius:6px;}
.names-wrap{display:flex;flex-wrap:wrap;gap:6px;padding-right:18px;}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border-radius:10px;padding:6px 12px;font-size:13px;color:var(--text);border:1px solid var(--border);}
.chip.me{background:var(--s-bg);border-color:var(--blue);color:var(--s-cl);font-weight:700;}
.chip-id{font-size:10px;color:var(--sub);}
.no-staff{font-size:13px;color:var(--muted);padding-right:18px;}

/* ── MONTH NAV ── */
.month-nav-bar{background:#fff;border-radius:14px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.mnav-btn{width:40px;height:40px;border-radius:12px;border:1.5px solid var(--border);background:transparent;color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:-apple-system,'SF Arabic','Geeza Pro','Helvetica Neue',Arial,sans-serif;}
.mnav-btn:active{background:var(--bg);}
.month-title{font-size:17px;font-weight:700;color:var(--dark);}

/* filters */
.filter-row{display:flex;gap:8px;margin-bottom:12px;}
.fsel{flex:1;padding:11px 14px;border-radius:12px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:14px;font-family:-apple-system,'SF Arabic','Geeza Pro','Helvetica Neue',Arial,sans-serif;outline:none;-webkit-appearance:none;box-shadow:0 1px 3px rgba(0,0,0,.06);}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.kpi{background:#fff;border-radius:12px;padding:10px 12px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.kpi-l{font-size:10px;color:var(--sub);margin-bottom:3px;font-weight:500;}
.kpi-v{font-size:18px;font-weight:700;color:var(--dark);}

/* ── EMP MONTH CARD ── */
.emp-month-card{background:#fff;border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.emp-month-hdr{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.emp-avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.emp-month-name{font-size:14px;font-weight:700;color:var(--dark);}
.emp-month-sec{font-size:11px;color:var(--sub);margin-top:2px;}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:10px 12px 12px;}
.day-cell{display:flex;flex-direction:column;align-items:center;gap:2px;}
.day-num{font-size:9px;color:var(--muted);font-weight:500;}
.day-b{width:100%;min-width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;}
.db-s{background:var(--s-bg);color:var(--s-cl);}
.db-m{background:var(--m-bg);color:var(--m-cl);}
.db-sup{background:var(--sup-bg);color:var(--sup-cl);}
.db-rest{background:var(--rest-bg);color:var(--rest-cl);}
.db-vac{background:var(--vac-bg);color:var(--vac-cl);}
.db-abs{background:var(--abs-bg);color:var(--abs-cl);}
.db-off{background:#EAF3DE;color:#27500A;}
.day-cell.editable{cursor:pointer;}
.day-cell.editable:active .day-b{opacity:.6;transform:scale(.9);}

/* ── VAC CARDS ── */
.vac-card{background:#fff;border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.vac-card-hdr{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.vac-rows{padding:4px 0;}
.vac-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);}
.vac-row:last-child{border-bottom:none;}
.vac-row-l{font-size:13px;color:var(--sub);}
.vac-row-r{font-size:13px;font-weight:700;color:var(--dark);}
.vac-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;background:var(--vac-bg);color:var(--vac-cl);}

/* ── BOTTOM SHEET MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:1.25rem 1.25rem 2rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-handle{width:40px;height:5px;background:var(--border);border-radius:3px;margin:0 auto 1.25rem;}
.modal-title{font-size:17px;font-weight:700;color:var(--dark);text-align:center;margin-bottom:1.25rem;}
.mfield{margin-bottom:1.1rem;}
.mfield label{font-size:13px;color:var(--sub);display:block;margin-bottom:6px;font-weight:500;}
.mfield select,.mfield input[type=text],.mfield input[type=date]{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:15px;font-family:-apple-system,'SF Arabic','Geeza Pro','Helvetica Neue',Arial,sans-serif;outline:none;-webkit-appearance:none;transition:border-color .15s;}
.mfield select:focus,.mfield input:focus{border-color:var(--blue);}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:.75rem;}
.mbtn{padding:14px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:-apple-system,'SF Arabic','Geeza Pro','Helvetica Neue',Arial,sans-serif;transition:all .15s;}
.mbtn-cancel{background:var(--bg);color:var(--sub);}
.mbtn-save{background:var(--blue);color:#fff;}
.mbtn-save:active{background:var(--dark);}

/* admin bar */
.admin-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.admin-btn{padding:10px 16px;border-radius:12px;border:1.5px solid var(--blue);background:transparent;color:var(--blue);font-size:13px;font-weight:700;cursor:pointer;font-family:-apple-system,'SF Arabic','Geeza Pro','Helvetica Neue',Arial,sans-serif;}
.admin-btn.danger{border-color:#A32D2D;color:#A32D2D;}

/* toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:500;opacity:0;transition:opacity .3s;z-index:200;pointer-events:none;white-space:nowrap;font-family:-apple-system,'SF Arabic','Geeza Pro','Helvetica Neue',Arial,sans-serif;}
.toast.show{opacity:1;}

/* legend */
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.leg{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--sub);}
.leg-dot{width:20px;height:16px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="sLogin" class="screen active">
  <div class="lcard">
    <div class="llogo">ط</div>
    <div class="ltitle">إدارة الطوارئ</div>
    <div class="lsub">مستشفى الحمادي</div>
    <div class="role-grid">
      <button class="rbtn sel" id="rEmp" onclick="pickRole('emp')">
        <span class="rbtn-icon">👤</span>
        <span class="rbtn-label">موظف</span>
        <span class="rbtn-sub">عرض فقط</span>
      </button>
      <button class="rbtn" id="rAdmin" onclick="pickRole('admin')">
        <span class="rbtn-icon">🔐</span>
        <span class="rbtn-label">مدير</span>
        <span class="rbtn-sub">تعديل الجدول</span>
      </button>
    </div>
    <div id="fEmp" class="lfield">
      <label>اختر اسمك</label>
      <select id="empSel"></select>
    </div>
    <div id="fPin" class="lfield" style="display:none;">
      <label>كلمة السر</label>
      <input type="password" id="pinIn" placeholder="••••" maxlength="20" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="lerr" id="lerr">كلمة السر غلط، حاول مرة ثانية</div>
    <button class="lbtn" onclick="login()">دخول</button>
  </div>
</div>

<!-- APP -->
<div id="sApp" class="screen">
  <div class="topbar">
    <div class="tb-info">
      <span class="tb-title">إدارة الطوارئ — الحمادي</span>
      <span class="tb-sub" id="tbSub"></span>
    </div>
    <div class="tb-actions">
      <span class="tb-badge" id="tbBadge"></span>
      <button class="tb-logout" onclick="logout()">خروج</button>
    </div>
  </div>

  <div class="app-content" id="appContent">
    <!-- TODAY -->
    <div id="tToday" class="tab active">
      <div class="date-strip">
        <label>التاريخ</label>
        <input type="date" id="dDate" onchange="renderToday()">
      </div>
      <div id="todayContent"></div>
    </div>

    <!-- MONTHLY -->
    <div id="tMonthly" class="tab">
      <div class="month-nav-bar">
        <button class="mnav-btn" onclick="chMonth(1)">&#8249;</button>
        <span class="month-title" id="mTitle"></span>
        <button class="mnav-btn" onclick="chMonth(-1)">&#8250;</button>
      </div>
      <div class="filter-row">
        <select id="secFilter" class="fsel" onchange="renderMonthly()">
          <option value="">جميع الأقسام</option>
          <option value="managers">المدراء المناوبين</option>
          <option value="support">مدير الدعم</option>
          <option value="coord">منسق الطوارئ</option>
          <option value="admit">مكتب التنويم</option>
          <option value="reception">الاستقبال</option>
        </select>
        <select id="empFilter" class="fsel" style="display:none;" onchange="renderMonthly()">
          <option value="">جميع الموظفين</option>
        </select>
      </div>
      <div class="kpi-row" id="kpiRow"></div>
      <div class="legend">
        <span class="leg"><span class="leg-dot db-s">ص</span>صباحي</span>
        <span class="leg"><span class="leg-dot db-m">م</span>مسائي</span>
        <span class="leg"><span class="leg-dot db-sup">د</span>دعم</span>
        <span class="leg"><span class="leg-dot db-rest">ر</span>راحة</span>
        <span class="leg"><span class="leg-dot db-vac">إج</span>إجازة</span>
        <span class="leg"><span class="leg-dot db-abs">غ</span>غياب</span>
      </div>
      <div id="adminBar" style="display:none;" class="admin-bar">
        <button class="admin-btn" onclick="openSheet('addEmp')">+ موظف</button>
        <button class="admin-btn" onclick="openSheet('addVac')">+ إجازة</button>
        <button class="admin-btn danger" onclick="resetData()">حذف التعديلات</button>
      </div>
      <div id="monthlyContent"></div>
    </div>

    <!-- VACATIONS -->
    <div id="tVac" class="tab">
      <div class="filter-row">
        <select id="vacYear" class="fsel" onchange="renderVac()">
          <option>2025</option><option selected>2026</option>
        </select>
        <button class="admin-btn" onclick="openSheet('addVac')" style="white-space:nowrap;">+ إجازة</button>
      </div>
      <div class="kpi-row" id="vacKpi"></div>
      <div id="vacContent"></div>
    </div>
  </div>

  <nav class="bnav" id="bnav"></nav>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="mTitle2"></div>
    <div id="mBody"></div>
    <div class="mbtns">
      <button class="mbtn mbtn-cancel" onclick="closeSheet()">إلغاء</button>
      <button class="mbtn mbtn-save" id="mSaveBtn">حفظ</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">تم الحفظ ✓</div>

<script>
const PIN='1411';
const MN=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const DF=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const SL={managers:'المدراء المناوبين',support:'مدير الدعم',coord:'منسق الطوارئ',admit:'مكتب التنويم',reception:'الاستقبال'};
const SC={managers:'#00539B',support:'#002855',coord:'#0F6E56',admit:'#185FA5',reception:'#1D7A8C'};
const SAV=['#B5D4F4','#9FE1CB','#FAC775','#F4C0D1','#D3D1C7'];
const SS={
  managers:{S:{l:'صباحي',t:'08:00-20:00',dc:'ds'},M:{l:'مسائي',t:'20:00-08:00',dc:'dm'}},
  support:{SUP:{l:'دعم',t:'12:00-00:00',dc:'dsup'}},
  coord:{S:{l:'دوام',t:'11:00-19:00',dc:'ds'}},
  admit:{S:{l:'صباحي',t:'06:00-14:00',dc:'ds'},M:{l:'مسائي',t:'14:00-22:00',dc:'dm'}},
  reception:{S:{l:'صباحي',t:'07:00-19:00',dc:'ds'},M:{l:'مسائي',t:'19:00-07:00',dc:'dm'},SUP:{l:'دعم',t:'12:00-00:00',dc:'dsup'}},
};
const MGR={'2026-05-01':{S:1,M:2},'2026-05-02':{S:3,M:4},'2026-05-03':{S:3,M:4},'2026-05-04':{S:3,M:4},'2026-05-05':{S:1,M:2},'2026-05-06':{S:1,M:2},'2026-05-07':{S:1,M:2},'2026-05-08':{S:3,M:4},'2026-05-09':{S:3,M:4},'2026-05-10':{S:3,M:4},'2026-05-11':{S:1,M:2},'2026-05-12':{S:1,M:2},'2026-05-13':{S:1,M:2},'2026-05-14':{S:3,M:4},'2026-05-15':{S:3,M:4},'2026-05-16':{S:3,M:4},'2026-05-17':{S:1,M:2},'2026-05-18':{S:1,M:2},'2026-05-19':{S:1,M:2},'2026-05-20':{S:3,M:4},'2026-05-21':{S:3,M:4},'2026-05-22':{S:3,M:4},'2026-05-23':{S:1,M:2},'2026-05-24':{S:1,M:2},'2026-05-25':{S:1,M:2},'2026-05-26':{S:3,M:4},'2026-05-27':{S:3,M:4},'2026-05-28':{S:3,M:4},'2026-05-29':{S:1,M:2},'2026-05-30':{S:1,M:2},'2026-05-31':{S:1,M:2}};
const RA=new Set([1,5,6,7,11,12,13,17,18,19,23,24,25,29,30,31]);
function getRec(id,d){if(RA.has(d)){if(id===18||id===16)return'S';if(id===20||id===19)return'M';if(id===17)return'SUP';return'REST';}else{if(id===12||id===11)return'S';if(id===15||id===14)return'M';if(id===13)return'SUP';return'REST';}}
function getAdmit(id,ds){if(new Date(ds).getDay()===5)return'REST';if(id===9||id===10)return'S';if(id===7||id===8)return'M';return'REST';}

const SK='hammadi_ed_v3';
const BE=[
  {id:1,name:'محمد جابر',no:'7288',sec:'managers',sh:'S'},
  {id:2,name:'عبدالله القحطاني',no:'13609',sec:'managers',sh:'M'},
  {id:3,name:'عبدالرحمن العمري',no:'11204',sec:'managers',sh:'S'},
  {id:4,name:'احمد عايد',no:'8386',sec:'managers',sh:'M'},
  {id:5,name:'عبدالهادي المجنوني',no:'10865',sec:'support',sh:'SUP'},
  {id:6,name:'حصة المقرن',no:'18690',sec:'coord',sh:'S'},
  {id:7,name:'مريم هوساوي',no:'15528',sec:'admit',sh:'M'},
  {id:8,name:'منال مهنى',no:'12175',sec:'admit',sh:'M'},
  {id:9,name:'خالدة المسعود',no:'1400',sec:'admit',sh:'S'},
  {id:10,name:'نوف الحوطي',no:'17828',sec:'admit',sh:'S'},
  {id:11,name:'مفرح الغزواني',no:'3203',sec:'reception',sh:'S'},
  {id:12,name:'صالح ابو هبيرة',no:'12606',sec:'reception',sh:'S'},
  {id:13,name:'خالد الشهري',no:'15415',sec:'reception',sh:'SUP'},
  {id:14,name:'سالم ابو باكورة',no:'18553',sec:'reception',sh:'M'},
  {id:15,name:'عبدالعزيز الهاشمي',no:'15302',sec:'reception',sh:'M'},
  {id:16,name:'عبدالعزيز الضويحي',no:'14682',sec:'reception',sh:'S'},
  {id:17,name:'هاجر الحريري',no:'18764',sec:'reception',sh:'SUP'},
  {id:18,name:'روان عاتي',no:'17918',sec:'reception',sh:'S'},
  {id:19,name:'عبدالمجيد الشامان',no:'18532',sec:'reception',sh:'M'},
  {id:20,name:'نواف المرشد',no:'16725',sec:'reception',sh:'M'},
];
const BO={managers:[1,2,3,4],support:[5],coord:[6],admit:[9,10,7,8],reception:[18,16,20,19,17,11,12,14,15,13]};
let emps=[...BE],ord=JSON.parse(JSON.stringify(BO));
let sched={},vacs=[],eid=30,vid=3,cell=null;
let yr=2026,mo=4,role=null,myId=null;

function ls(){try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch(e){}return null;}
function ss(){try{localStorage.setItem(SK,JSON.stringify({sched,vacs,ord,eid,vid,ex:emps.filter(e=>e.id>=30)}));}catch(e){}showToast();}
function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function resetData(){if(!confirm('حذف كل التعديلات والرجوع للجدول الأصلي؟'))return;try{localStorage.removeItem(SK);}catch(e){}location.reload();}

const sv=ls();
if(sv){if(sv.sched)sched=sv.sched;if(sv.vacs)vacs=sv.vacs;if(sv.ord)ord=sv.ord;if(sv.eid)eid=sv.eid;if(sv.vid)vid=sv.vid;if(sv.ex&&sv.ex.length){emps=[...BE,...sv.ex];sv.ex.forEach(e=>{if(!ord[e.sec])ord[e.sec]=[];if(!ord[e.sec].includes(e.id))ord[e.sec].push(e.id);});}}

document.getElementById('empSel').innerHTML=emps.map(e=>`<option value="${e.id}">${e.name} (${e.no})</option>`).join('');
let selRole='emp';
function pickRole(r){
  selRole=r;
  document.getElementById('rEmp').classList.toggle('sel',r==='emp');
  document.getElementById('rAdmin').classList.toggle('sel',r==='admin');
  document.getElementById('fPin').style.display=r==='admin'?'block':'none';
  document.getElementById('fEmp').style.display=r==='emp'?'block':'none';
  document.getElementById('lerr').style.display='none';
}
function login(){
  document.getElementById('lerr').style.display='none';
  if(selRole==='admin'){if(document.getElementById('pinIn').value!==PIN){document.getElementById('lerr').style.display='block';return;}role='admin';myId=null;}
  else{role='emp';myId=parseInt(document.getElementById('empSel').value);}
  document.getElementById('sLogin').classList.remove('active');
  document.getElementById('sApp').classList.add('active');
  initApp();
}
function logout(){role=null;myId=null;document.getElementById('sApp').classList.remove('active');document.getElementById('sLogin').classList.add('active');document.getElementById('pinIn').value='';pickRole('emp');}

function pad(n){return String(n).padStart(2,'0');}
function mkds(y,m,d){return `${y}-${pad(m+1)}-${pad(d)}`;}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function gk(id,d){return `${id}_${d}`;}

function gst(id,d){
  const k=gk(id,d);if(sched[k])return sched[k];
  const e=emps.find(x=>x.id===id);if(!e)return'S';
  const v=vacs.find(v=>v.eid===id&&d>=v.from&&d<=v.to);if(v)return'VAC';
  if(yr===2026&&mo===4){
    if(e.sec==='managers'&&MGR[d]){const m=MGR[d];if(m.S===id)return'S';if(m.M===id)return'M';return'REST';}
    if(e.sec==='admit')return getAdmit(id,d);
    if(e.sec==='reception')return getRec(id,parseInt(d.split('-')[2]));
  }
  return e.sh;
}
function si(sec,c){return SS[sec]&&SS[sec][c]?SS[sec][c]:{l:c,t:'',dc:'ds'};}
function dbClass(s){return{S:'db-s',M:'db-m',SUP:'db-sup',REST:'db-rest',VAC:'db-vac',ABS:'db-abs',OFF:'db-off'}[s]||'db-rest';}
function dbLabel(s){return{S:'ص',M:'م',SUP:'د',REST:'ر',VAC:'إج',ABS:'غ',OFF:'إ'}[s]||'?';}
function secIdx(sec){return['managers','support','coord','admit','reception'].indexOf(sec);}

function initApp(){
  const isA=role==='admin';
  const me=emps.find(e=>e.id===myId);
  document.getElementById('tbSub').textContent=isA?'راكان — مسؤول الطوارئ':(me?me.name+' ('+me.no+')':'');
  document.getElementById('tbBadge').textContent=isA?'مدير':'موظف';
  document.getElementById('adminBar').style.display=isA?'flex':'none';
  const tabs=isA?
    [{id:'tToday',icon:'today',l:'اليوم'},{id:'tMonthly',icon:'month',l:'الشهري'},{id:'tVac',icon:'vac',l:'الإجازات'}]:
    [{id:'tToday',icon:'today',l:'اليوم'},{id:'tMonthly',icon:'month',l:'الشهري'}];
  const icons={today:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,month:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>`,vac:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 8C8 10 5.9 16.17 3.82 22"/><path d="M9.11 11.26a10 10 0 0 0 9.78 8.73"/><path d="M21 8A9 9 0 0 0 6 6.32"/></svg>`};
  document.getElementById('bnav').innerHTML=tabs.map((t,i)=>`<button class="bnav-btn${i===0?' active':''}" onclick="switchTab('${t.id}',this)"><svg class="bnav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${icons[t.icon].replace(/<svg[^>]*>/,'').replace('</svg>','')}</svg>${t.l}</button>`).join('');
  if(!isA){document.getElementById('empFilter').style.display='block';document.getElementById('empFilter').innerHTML=`<option value="">جميع الموظفين</option>`+emps.map(e=>`<option value="${e.id}"${e.id===myId?' selected':''}>${e.name}</option>`).join('');}
  const today=new Date();
  document.getElementById('dDate').value=`${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  renderToday();renderMonthly();if(isA)renderVac();
}

function switchTab(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');btn.classList.add('active');
  document.getElementById('appContent').scrollTop=0;
}

function renderToday(){
  const d=document.getElementById('dDate').value;if(!d){document.getElementById('todayContent').innerHTML='';return;}
  const dt=new Date(d);const isA=role==='admin';
  let html='';
  if(!isA&&myId){
    const me=emps.find(e=>e.id===myId);
    if(me){
      const ms=gst(me.id,d);const isW=ms!=='REST'&&ms!=='VAC'&&ms!=='OFF';
      const inf=isW?si(me.sec,ms):null;
      html+=`<div class="hero"><div class="hero-date">${DF[dt.getDay()]} ${dt.getDate()} ${MN[dt.getMonth()]} ${dt.getFullYear()}</div><div class="hero-name">${me.name}</div><div class="hero-box"><div class="hero-sec">${SL[me.sec]}</div>${isW?`<div class="hero-shift">${inf.l}</div><div class="hero-time">${inf.t}</div>`:`<div class="hero-off">${ms==='VAC'?'إجازة 🌴':ms==='REST'?'يوم راحة ☕':'خارج المناوبة'}</div>`}</div></div>`;
    }
  }
  ['managers','support','coord','admit','reception'].forEach(sec=>{
    const semp=emps.filter(e=>e.sec===sec);
    const shifts=SS[sec];const by={};Object.keys(shifts).forEach(k=>{by[k]=[];});by.OTHER=[];
    let wc=0;
    semp.forEach(e=>{const s=gst(e.id,d);if(shifts[s]){by[s].push(e);wc++;}else if(s!=='REST')by.OTHER.push({...e,s});});
    html+=`<div class="sec-card"><div class="sec-hdr" style="background:${SC[sec]};"><span class="sec-hdr-title">${SL[sec]}</span><span class="sec-hdr-count">${wc}/${semp.length}</span></div>`;
    Object.entries(shifts).forEach(([c,inf])=>{
      const list=by[c]||[];
      html+=`<div class="shift-row"><div class="shift-row-hdr"><div class="shift-dot ${inf.dc}"></div><span class="shift-label">${inf.l}</span><span class="shift-time">${inf.t}</span></div><div class="names-wrap">`;
      if(list.length)list.forEach(e=>{const isMe=e.id===myId;html+=`<span class="chip${isMe?' me':''}"><span>${e.name}</span><span class="chip-id">${e.no}</span></span>`;});
      else html+=`<span class="no-staff">لا يوجد موظفين</span>`;
      html+=`</div></div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('todayContent').innerHTML=html;
}

function chMonth(d){mo+=d;if(mo<0){mo=11;yr--;}if(mo>11){mo=0;yr++;}renderMonthly();}

function renderMonthly(){
  document.getElementById('mTitle').textContent=MN[mo]+' '+yr;
  const days=dim(yr,mo);const isA=role==='admin';
  const sf=document.getElementById('secFilter').value;
  const ef=isA?null:(parseInt(document.getElementById('empFilter').value)||null);
  const secs=sf?[sf]:['managers','support','coord','admit','reception'];
  let tp=0,tr=0,tv=0,ta=0;
  emps.forEach(e=>{if(ef&&e.id!==ef)return;for(let d=1;d<=days;d++){const s=gst(e.id,mkds(yr,mo,d));if(s==='ABS')ta++;else if(s==='VAC'||s==='OFF')tv++;else if(s==='REST')tr++;else tp++;}});
  document.getElementById('kpiRow').innerHTML=`<div class="kpi"><div class="kpi-l">حضور</div><div class="kpi-v">${tp}</div></div><div class="kpi"><div class="kpi-l">راحة</div><div class="kpi-v">${tr}</div></div><div class="kpi"><div class="kpi-l">إجازة</div><div class="kpi-v">${tv}</div></div><div class="kpi"><div class="kpi-l">غياب</div><div class="kpi-v" style="color:#A32D2D;">${ta}</div></div>`;
  let html='';
  secs.forEach(sec=>{
    let ids=ord[sec]||emps.filter(e=>e.sec===sec).map(e=>e.id);
    if(ef)ids=ids.filter(i=>i===ef);
    const list=ids.map(i=>emps.find(e=>e.id===i)).filter(Boolean);
    if(!list.length)return;
    list.forEach(e=>{
      const isMe=e.id===myId;const ci=secIdx(sec);const av=SAV[ci]||'#B5D4F4';
      html+=`<div class="emp-month-card"><div class="emp-month-hdr"><div class="emp-avatar" style="background:${av};color:#002855;">${e.name.slice(0,2)}</div><div><div class="emp-month-name">${isMe?'★ ':''}${e.name}</div><div class="emp-month-sec">${SL[sec]} · ${e.no}</div></div></div><div class="days-grid">`;
      for(let d=1;d<=days;d++){
        const dstr=mkds(yr,mo,d);const s=gst(e.id,dstr);
        html+=`<div class="day-cell${isA?' editable':''}"${isA?` onclick="openCell(${e.id},'${dstr}','${e.name}','${sec}')"`:''}>`;
        html+=`<span class="day-num">${d}</span><span class="day-b ${dbClass(s)}">${dbLabel(s)}</span></div>`;
      }
      html+=`</div></div>`;
    });
  });
  document.getElementById('monthlyContent').innerHTML=html||`<div style="text-align:center;padding:2rem;color:var(--sub);">لا يوجد موظفين</div>`;
}

function renderVac(){
  const y=parseInt(document.getElementById('vacYear').value);
  const yv=vacs.filter(v=>v.from.startsWith(y)||v.to.startsWith(y));
  const ann=21;const used={};emps.forEach(e=>{used[e.id]=0;});
  vacs.forEach(v=>{const d=Math.round((new Date(v.to)-new Date(v.from))/86400000)+1;used[v.eid]=(used[v.eid]||0)+d;});
  const avg=Math.round(Object.values(used).reduce((a,b)=>a+b,0)/emps.length);
  document.getElementById('vacKpi').innerHTML=`<div class="kpi"><div class="kpi-l">إجمالي</div><div class="kpi-v">${yv.length}</div></div><div class="kpi"><div class="kpi-l">متوسط</div><div class="kpi-v">${avg} <span style="font-size:12px;color:var(--sub);">يوم</span></div></div>`;
  let html='';
  if(!yv.length){html=`<div style="text-align:center;padding:2rem;color:var(--sub);font-size:15px;">لا توجد إجازات مسجلة</div>`;}
  else yv.forEach(v=>{
    const e=emps.find(x=>x.id===v.eid)||{name:'—',no:'',sec:'managers'};
    const d=Math.round((new Date(v.to)-new Date(v.from))/86400000)+1;
    const rem=Math.max(0,ann-(used[v.eid]||0));
    const pct=Math.min(100,Math.round(((used[v.eid]||0)/ann)*100));
    html+=`<div class="vac-card"><div class="vac-card-hdr"><div class="emp-avatar" style="background:#B5D4F4;color:#002855;">${e.name.slice(0,2)}</div><div><div class="emp-month-name">${e.name}</div><div class="emp-month-sec">${SL[e.sec]||''} · ${e.no}</div></div></div><div class="vac-rows"><div class="vac-row"><span class="vac-row-l">النوع</span><span class="vac-pill">${v.type}</span></div><div class="vac-row"><span class="vac-row-l">الفترة</span><span class="vac-row-r" dir="ltr">${v.from} — ${v.to}</span></div><div class="vac-row"><span class="vac-row-l">الأيام</span><span class="vac-row-r">${d} يوم</span></div><div class="vac-row"><span class="vac-row-l">الرصيد المتبقي</span><span class="vac-row-r" style="color:var(--blue);">${rem} من ${ann}</span></div><div class="vac-row"><span class="vac-row-l">نسبة الاستخدام</span><div style="flex:1;margin-right:12px;"><div style="height:8px;border-radius:4px;background:var(--border);overflow:hidden;"><div style="height:100%;border-radius:4px;background:var(--teal);width:${pct}%"></div></div></div></div></div></div>`;
  });
  document.getElementById('vacContent').innerHTML=html;
}

let mMode=null;
function openCell(id,d,name,sec){
  if(role!=='admin')return;
  cell={id,d,sec};mMode='cell';
  document.getElementById('mTitle2').textContent=name+' — '+d;
  const opts=Object.entries(SS[sec]||{}).map(([k,v])=>`<option value="${k}">${v.l} (${v.t})</option>`).join('')+`<option value="VAC">إجازة</option><option value="OFF">إجازة رسمية</option><option value="ABS">غياب</option><option value="REST">راحة</option>`;
  document.getElementById('mBody').innerHTML=`<div class="mfield"><label>الحالة</label><select id="mSt">${opts}</select></div><div class="mfield"><label>ملاحظة (اختياري)</label><input type="text" id="mNote" placeholder="..."></div>`;
  document.getElementById('mSt').value=gst(id,d);
  document.getElementById('mNote').value=typeof sched[gk(id,d)]==='object'?'':sched[gk(id,d)]||'';
  document.getElementById('mSaveBtn').onclick=saveCell;
  document.getElementById('modal').classList.add('open');
}
function saveCell(){sched[gk(cell.id,cell.d)]=document.getElementById('mSt').value;closeSheet();ss();renderMonthly();renderToday();}

function openSheet(t){
  mMode=t;
  if(t==='addEmp'){
    document.getElementById('mTitle2').textContent='إضافة موظف';
    const secOpts=Object.entries(SL).map(([k,v])=>`<option value="${k}">${v}</option>`).join('');
    document.getElementById('mBody').innerHTML=`<div class="mfield"><label>الاسم</label><input type="text" id="nName"></div><div class="mfield"><label>الرقم الوظيفي</label><input type="text" id="nNo"></div><div class="mfield"><label>القسم</label><select id="nSec" onchange="updSh()">${secOpts}</select></div><div class="mfield"><label>الشيفت الافتراضي</label><select id="nSh"></select></div>`;
    updSh();
  } else {
    document.getElementById('mTitle2').textContent='إضافة إجازة';
    document.getElementById('mBody').innerHTML=`<div class="mfield"><label>الموظف</label><select id="vEmp">${emps.map(e=>`<option value="${e.id}">${e.name} (${e.no})</option>`).join('')}</select></div><div class="mfield"><label>من</label><input type="date" id="vFrom"></div><div class="mfield"><label>إلى</label><input type="date" id="vTo"></div><div class="mfield"><label>نوع الإجازة</label><select id="vType"><option>سنوية</option><option>مرضية</option><option>طارئة</option><option>بدون راتب</option></select></div>`;
  }
  document.getElementById('mSaveBtn').onclick=mMode==='addEmp'?saveEmp:saveVac2;
  document.getElementById('modal').classList.add('open');
}
function updSh(){const sec=document.getElementById('nSec').value;document.getElementById('nSh').innerHTML=Object.entries(SS[sec]||{}).map(([k,v])=>`<option value="${k}">${v.l}</option>`).join('');}
function saveEmp(){const n=document.getElementById('nName').value.trim();if(!n)return;const sec=document.getElementById('nSec').value;const e={id:eid++,name:n,no:document.getElementById('nNo').value.trim(),sec,sh:document.getElementById('nSh').value};emps.push(e);if(!ord[sec])ord[sec]=[];ord[sec].push(e.id);closeSheet();ss();renderMonthly();}
function saveVac2(){const from=document.getElementById('vFrom').value,to=document.getElementById('vTo').value;if(!from||!to)return;vacs.push({id:vid++,eid:parseInt(document.getElementById('vEmp').value),from,to,type:document.getElementById('vType').value});closeSheet();ss();renderVac();}
function closeSheet(){document.getElementById('modal').classList.remove('open');cell=null;}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeSheet();});
</script>
